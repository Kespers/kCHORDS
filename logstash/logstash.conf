input
{
	kafka
	{
		bootstrap_servers => "kafkaServer:9092"
		topics => ["songs"]
		codec => "json"
	}
}

filter {
  mutate {
    update => {
      "Hdfs_Tracks_Path" => "http://localhost:9864/webhdfs/v1%{[Hdfs_Tracks_Path]}/vocals.wav?op=OPEN&namenoderpcaddress=namenode:9000&offset=0"
    }
  }
}

output
{
    # stdout {
    #     codec => rubydebug
    # }
    elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "songs"
        codec => "json"
    }
}