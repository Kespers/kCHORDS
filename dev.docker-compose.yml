services:
  spark-notebook:
      hostname: spark-notebook
      build:
        context: ./spark
        dockerfile: notebook.Dockerfile
      ports:
        - 8888:8888
        - 4041:4040
      env_file:
        ./spark/.env
      volumes:
        - ./spark:/home/jovyan
      networks:
        - kCHORDS_network

networks:
  kCHORDS_network:
    external: true