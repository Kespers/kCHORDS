<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="margin: 0;">
    <!-- <form id="myForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        
        <button type="submit">Submit</button>
    </form>     -->

    <iframe src="http://localhost:3000/public-dashboards/db8c2cd843414c5dba47aee8457b2bbc"
    style="position: absolute; height: 100%; width: 100%; border: none"></iframe>

    <script>
        document.getElementById('myForm').addEventListener('submit', function(event) {
            event.preventDefault();  // Evita il comportamento predefinito del form

            const name = document.getElementById('name').value;
            const data = { name: name };
            const url = 'http://localhost:9880/kCHORDS';  // URL di Fluentd

            var xmlHttp = new XMLHttpRequest();
            xmlHttp.open('POST', url, true);
            xmlHttp.setRequestHeader('Content-Type', 'application/json; charset=utf-8'); // Imposta il tipo di contenuto a JSON
            xmlHttp.setRequestHeader('Access-Control-Allow-Origin', '*'); // Permette il CORS (se necessario)

            xmlHttp.onreadystatechange = function() {
                if (xmlHttp.readyState == 4 && xmlHttp.status == 200) {
                    // Successo
                    console.log('Success:', xmlHttp.responseText);
                    alert('Data sent successfully!');
                } else if (xmlHttp.readyState == 4) {
                    // Errore
                    console.error('Error:', xmlHttp.responseText);
                    alert('Error sending data: ' + xmlHttp.responseText);
                }
            };

            // Invia i dati come JSON
            xmlHttp.send(JSON.stringify(data));
        });
    </script>
</body>
</html>
